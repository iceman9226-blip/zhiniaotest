<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudMetric AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      /* Custom scrollbar for better UX */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* Dynamic Background Animations */
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 10s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
      .animation-delay-4000 {
        animation-delay: 4s;
      }

      @keyframes gradient-x {
        0%, 100% {
            background-size: 200% 200%;
            background-position: left center;
        }
        50% {
            background-size: 200% 200%;
            background-position: right center;
        }
      }
      .animate-gradient-x {
        animation: gradient-x 3s ease infinite;
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(-6deg) scale(1.1); }
        50% { transform: rotate(6deg) scale(1.1); }
      }
      .group:hover .group-hover\:animate-wiggle {
        animation: wiggle 0.5s ease-in-out infinite;
      }

      @keyframes float-in {
        0% { 
          transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); 
          opacity: 0; 
        }
        20% { 
          opacity: 1; 
          transform: translate(calc(var(--tx) * 0.8 + var(--px) * 0.5), calc(var(--ty) * 0.8 + var(--py) * 0.5)) scale(1.3) rotate(calc(var(--rot) * 0.8)); 
        }
        50% { 
          opacity: 1; 
          transform: translate(calc(var(--tx) * 0.5 + var(--px)), calc(var(--ty) * 0.5 + var(--py))) scale(1.0) rotate(calc(var(--rot) * 0.4)); 
        }
        80% { 
          opacity: 0; 
          transform: translate(calc(var(--tx) * 0.2 + var(--px) * 0.5), calc(var(--ty) * 0.2 + var(--py) * 0.5)) scale(0.5) rotate(calc(var(--rot) * 0.1)); 
        }
        100% { 
          opacity: 0; 
          transform: translate(0, 0) scale(0) rotate(0deg); 
        }
      }
      .animate-float-in {
        animation: float-in var(--duration, 1.5s) ease-in-out forwards;
      }
    </style>

{
  "imports": {

  }
}
</script>
